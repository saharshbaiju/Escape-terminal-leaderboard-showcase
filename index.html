<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#020a02" />
    <title>Escape the Terminal — Leaderboard</title>
  </head>
  <body>
    <div class="stage">
      <header class="masthead">
        <div class="mast-left">
          <div class="mast-kicker">┌─ amFOSS // ESCAPE-THE-TERMINAL ─┐</div>
          <div class="mast-title" data-text="LEADERBOARD">LEADERBOARD</div>
          <div class="mast-rule">╾─────────◈ TOP&nbsp;OPERATIVES ◈─────────╼</div>
        </div>
        <div class="mast-right">
          <div class="live"><span class="dot"></span> LIVE</div>
          <div class="stat" id="count">0 RUNS</div>
          <div class="stat clock" id="clock">--:--:--</div>
        </div>
      </header>

      <section class="podium" id="podium"></section>

      <div class="list-head">
        <span class="c-rank">RANK</span>
        <span class="c-handle">HANDLE</span>
        <span class="c-outcome">OUTCOME</span>
        <span class="c-score">SCORE</span>
        <span class="c-time">TIME</span>
      </div>
      <main class="board" id="board"></main>
      <div class="empty" id="empty">⌁ awaiting the first escape ⌁</div>

      <footer class="ticker" id="ticker">▸ system idle — waiting for the first escape…</footer>
    </div>

    <!-- QR: hover/click the button to reveal a join code bottom-right -->
    <button class="qr-toggle" id="qr-toggle">▣ SCAN&nbsp;TO&nbsp;PLAY</button>
    <div class="qr-panel" id="qr-panel" hidden>
      <div class="qr-head">┌─ JOIN THE RUN ─┐</div>
      <div class="qr-code" id="qr-code"></div>
      <div class="qr-sub">scan to play &amp; take your<br />place on the leaderboard</div>
      <div class="qr-url" id="qr-url"></div>
    </div>

    <!-- hero card for a newly arrived run -->
    <div class="hero-layer" id="hero-layer"></div>

    <!-- CRT overlays -->
    <div class="crt crt-scanlines"></div>
    <div class="crt crt-vignette"></div>
    <div class="crt crt-flicker"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
